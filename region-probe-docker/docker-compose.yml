services:
  region-probe:
    image: ${REGION_PROBE_IMAGE:-ghcr.io/wangzhilin777/region-probe-docker:latest}
    container_name: region-probe
    env_file:
      - .env
    ports:
      - "${HOST_PORT:-8226}:${LISTEN_PORT:-8080}"
    environment:
      LISTEN_HOST: ${LISTEN_HOST:-0.0.0.0}
      LISTEN_PORT: ${LISTEN_PORT:-8080}
      TRACE_HOST: ${TRACE_HOST:-speed.cloudflare.com}
      TRACE_PATH: ${TRACE_PATH:-/cdn-cgi/trace}
      TLS_SERVER_NAME: ${TLS_SERVER_NAME:-speed.cloudflare.com}
      CONNECT_TIMEOUT: ${CONNECT_TIMEOUT:-3.5}
      READ_TIMEOUT: ${READ_TIMEOUT:-4.5}
      MAX_WORKERS: ${MAX_WORKERS:-24}
      MAX_TARGETS: ${MAX_TARGETS:-500}
      REGION_PROBE_TOKEN: ${REGION_PROBE_TOKEN:-changeme}
      PROXY_URL: ${PROXY_URL:-}
      PROXY_REMOTE_DNS: ${PROXY_REMOTE_DNS:-false}
    restart: unless-stopped
